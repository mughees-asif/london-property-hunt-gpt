[profile]
name = "Alex"
age = 29
profession = "Software Engineer"
profile_description = "easy-going, clean, tidy, cooks, gym, hybrid WFH 2 days/week, no parties, professional"
profile_summary = "Clean, tidy, reliable, hybrid WFH, permanent contract"
work_postcode = "EC2A 1NT"
move_in_date = "2026-06-01"

[criteria]
primary_areas = ["Hackney", "Shoreditch", "Bethnal Green", "Clapton"]
secondary_areas = ["Dalston", "Stoke Newington", "Islington"]
room_budget = 1500
room_budget_no_bills = 1700
studio_budget = 1900
flatmate_min_age = 28
flatmate_max_age = 40
skip_student_households = true

[paths]
hunt_dir = "~/my-room-hunt"
tracker_filename = "london_room_hunt.xlsx"
outreach_dir = "outreach"
run_dir = "runs"
outbox_dir = "outbox"

[openai]
model = "gpt-5.4"
reasoning_effort = "low"
enable_extraction = true
enable_outreach = true

[email]
to = "you@gmail.com"
from_address = "you@gmail.com"
mode = "html_file" # html_file or smtp
send_by_default = false

